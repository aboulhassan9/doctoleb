name: DoctoLeb CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '17 2 * * 1'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release lane override'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - docs
          - frontend-patient
          - frontend-ops
          - frontend-control-plane
          - frontend-all
          - backend
          - full

permissions:
  contents: read

concurrency:
  group: doctoleb-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  SUPABASE_CLI_VERSION: 2.72.7
  VERCEL_CLI_VERSION: 50.1.3

jobs:
  detect-changes:
    name: Detect release lane
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      lane: ${{ steps.classify.outputs.lane }}
      reason: ${{ steps.classify.outputs.reason }}
      apps: ${{ steps.classify.outputs.apps }}
      affected_systems: ${{ steps.classify.outputs.affected_systems }}
      domains: ${{ steps.classify.outputs.domains }}
      required_proofs: ${{ steps.classify.outputs.required_proofs }}
      smoke_apps: ${{ steps.classify.outputs.smoke_apps }}
      auth_scenarios: ${{ steps.classify.outputs.auth_scenarios }}
      deploy_vercel: ${{ steps.classify.outputs.deploy_vercel }}
      deploy_supabase_functions: ${{ steps.classify.outputs.deploy_supabase_functions }}
      control_plane_functions: ${{ steps.classify.outputs.control_plane_functions }}
      tenant_functions: ${{ steps.classify.outputs.tenant_functions }}
      run_backend_contract: ${{ steps.classify.outputs.run_backend_contract }}
      run_db_contracts: ${{ steps.classify.outputs.run_db_contracts }}
      run_migration_bundle: ${{ steps.classify.outputs.run_migration_bundle }}
      run_resolver_smoke: ${{ steps.classify.outputs.run_resolver_smoke }}
      run_admin_cors_smoke: ${{ steps.classify.outputs.run_admin_cors_smoke }}
      run_browser_smoke: ${{ steps.classify.outputs.run_browser_smoke }}
      run_auth_smoke: ${{ steps.classify.outputs.run_auth_smoke }}
      run_flow_smoke: ${{ steps.classify.outputs.run_flow_smoke }}
      run_csp_smoke: ${{ steps.classify.outputs.run_csp_smoke }}
      vercel_matrix: ${{ steps.classify.outputs.vercel_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Classify changed files
        id: classify
        run: npm run ci:classify
        env:
          RELEASE_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type || 'auto' }}

      - name: Summarize lane
        run: |
          {
            echo "### Release lane"
            echo ""
            echo "- Lane: \`${{ steps.classify.outputs.lane }}\`"
            echo "- Reason: ${{ steps.classify.outputs.reason }}"
            echo "- Affected systems: \`${{ steps.classify.outputs.affected_systems }}\`"
            echo "- Domains: \`${{ steps.classify.outputs.domains }}\`"
            echo "- Required proofs: \`${{ steps.classify.outputs.required_proofs }}\`"
            echo "- Apps: \`${{ steps.classify.outputs.apps }}\`"
            echo "- Control-plane functions: \`${{ steps.classify.outputs.control_plane_functions }}\`"
            echo "- Tenant functions: \`${{ steps.classify.outputs.tenant_functions }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-docs:
    name: Verify docs-only change
    needs: detect-changes
    if: needs.detect-changes.outputs.lane == 'docs'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Confirm no deploy needed
        run: echo "Docs-only change. No build or deployment required."

  verify-frontend:
    name: Verify frontend lane
    needs: detect-changes
    if: needs.detect-changes.outputs.lane == 'frontend'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build affected frontend apps
        run: |
          set -euo pipefail
          IFS=',' read -ra apps <<< "${APPS}"
          for app in "${apps[@]}"; do
            case "$app" in
              patient-web) npm run build:patient ;;
              clinic-ops) npm run build:ops ;;
              control-plane) npm run build:control-plane ;;
              *) echo "::error::Unknown frontend app: $app"; exit 1 ;;
            esac
          done
        env:
          APPS: ${{ needs.detect-changes.outputs.apps }}

      - name: Guard affected frontend bundles against secret leakage
        run: |
          set -euo pipefail
          IFS=',' read -ra apps <<< "${APPS}"
          for app in "${apps[@]}"; do
            BUNDLE_APP="$app" npm run audit:bundle-secrets
          done
        env:
          APPS: ${{ needs.detect-changes.outputs.apps }}

      - name: Audit high-severity dependencies
        run: npm run audit:high

  verify-backend:
    name: Verify backend lane
    needs: detect-changes
    if: needs.detect-changes.outputs.lane == 'backend'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java for PDF/A validation
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Validate clinical PDF/A fixture
        run: npm run test:pdfa

      - name: Build affected consumer apps
        if: needs.detect-changes.outputs.apps != ''
        run: |
          set -euo pipefail
          IFS=',' read -ra apps <<< "${APPS}"
          for app in "${apps[@]}"; do
            case "$app" in
              patient-web) npm run build:patient ;;
              clinic-ops) npm run build:ops ;;
              control-plane) npm run build:control-plane ;;
              *) echo "::error::Unknown consumer app: $app"; exit 1 ;;
            esac
          done
        env:
          APPS: ${{ needs.detect-changes.outputs.apps }}

      - name: Guard affected consumer bundles against secret leakage
        if: needs.detect-changes.outputs.apps != ''
        run: |
          set -euo pipefail
          IFS=',' read -ra apps <<< "${APPS}"
          for app in "${apps[@]}"; do
            BUNDLE_APP="$app" npm run audit:bundle-secrets
          done
        env:
          APPS: ${{ needs.detect-changes.outputs.apps }}

      - name: Check tenant migration bundle
        if: needs.detect-changes.outputs.run_migration_bundle == 'true'
        run: npm run check:tenant-migration-bundle

      - name: Audit backend contracts
        if: needs.detect-changes.outputs.run_backend_contract == 'true'
        run: npm run audit:backend-contract

      - name: Install PostgreSQL client for DB contract checks
        if: needs.detect-changes.outputs.run_db_contracts == 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Setup Supabase CLI
        if: needs.detect-changes.outputs.run_db_contracts == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start disposable local Supabase stack
        if: needs.detect-changes.outputs.run_db_contracts == 'true'
        run: supabase start -x realtime,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Apply tenant migrations to disposable local database
        if: needs.detect-changes.outputs.run_db_contracts == 'true'
        run: supabase db reset --local --no-seed

      - name: Export local Supabase contract-test environment
        if: needs.detect-changes.outputs.run_db_contracts == 'true'
        run: |
          set -euo pipefail

          status="$(supabase status -o env)"

          get_env_value() {
            raw="$(printf '%s\n' "$status" | awk -F= -v key="$1" '$1 == key { print substr($0, length(key) + 2) }' | tail -n 1)"
            printf '%s' "$raw" | sed -e 's/^"//' -e 's/"$//'
          }

          db_url="$(get_env_value DB_URL)"
          api_url="$(get_env_value API_URL)"
          anon_key="$(get_env_value ANON_KEY)"

          if [ -z "$db_url" ] || [ -z "$api_url" ] || [ -z "$anon_key" ]; then
            echo "::error::Could not resolve local Supabase DB/API/anon values from supabase status."
            exit 1
          fi

          {
            echo "BACKEND_TEST_DATABASE_URL<<EOF"
            printf '%s\n' "$db_url"
            echo "EOF"
            echo "BACKEND_TEST_SUPABASE_URL<<EOF"
            printf '%s\n' "$api_url"
            echo "EOF"
            echo "BACKEND_TEST_SUPABASE_ANON_KEY<<EOF"
            printf '%s\n' "$anon_key"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run backend DB contract checks
        if: needs.detect-changes.outputs.run_db_contracts == 'true'
        run: npm run test:backend-db-contract
        env:
          BACKEND_DB_CONTRACT_REQUIRED: 'true'

      - name: Stop disposable local Supabase stack
        if: always() && needs.detect-changes.outputs.run_db_contracts == 'true'
        run: supabase stop --no-backup || true

      - name: Audit high-severity dependencies
        run: npm run audit:high

  verify-full:
    name: Verify full system
    needs: detect-changes
    if: needs.detect-changes.outputs.lane == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java for PDF/A validation
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build unified app
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Validate clinical PDF/A fixture
        run: npm run test:pdfa

      - name: Build marketing app for local E2E
        run: npm run build:marketing

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run local E2E (marketing landing)
        run: npm run test:e2e:local

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-local-e2e
          path: output/playwright/
          if-no-files-found: ignore

      - name: Check tenant migration bundle
        run: npm run check:tenant-migration-bundle

      - name: Audit backend contracts
        run: npm run audit:backend-contract

      - name: Install PostgreSQL client for DB contract checks
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start disposable local Supabase stack
        run: supabase start -x realtime,imgproxy,mailpit,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Apply tenant migrations to disposable local database
        run: supabase db reset --local --no-seed

      - name: Export local Supabase contract-test environment
        run: |
          set -euo pipefail

          status="$(supabase status -o env)"

          get_env_value() {
            raw="$(printf '%s\n' "$status" | awk -F= -v key="$1" '$1 == key { print substr($0, length(key) + 2) }' | tail -n 1)"
            printf '%s' "$raw" | sed -e 's/^"//' -e 's/"$//'
          }

          db_url="$(get_env_value DB_URL)"
          api_url="$(get_env_value API_URL)"
          anon_key="$(get_env_value ANON_KEY)"

          if [ -z "$db_url" ] || [ -z "$api_url" ] || [ -z "$anon_key" ]; then
            echo "::error::Could not resolve local Supabase DB/API/anon values from supabase status."
            exit 1
          fi

          {
            echo "BACKEND_TEST_DATABASE_URL<<EOF"
            printf '%s\n' "$db_url"
            echo "EOF"
            echo "BACKEND_TEST_SUPABASE_URL<<EOF"
            printf '%s\n' "$api_url"
            echo "EOF"
            echo "BACKEND_TEST_SUPABASE_ANON_KEY<<EOF"
            printf '%s\n' "$anon_key"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run backend DB contract checks
        run: npm run test:backend-db-contract
        env:
          BACKEND_DB_CONTRACT_REQUIRED: 'true'

      - name: Stop disposable local Supabase stack
        if: always()
        run: supabase stop --no-backup || true

      - name: Audit high-severity dependencies
        run: npm run audit:high

      - name: Build patient app
        run: npm run build:patient

      - name: Build clinic ops app
        run: npm run build:ops

      - name: Build control-plane app
        run: npm run build:control-plane

      - name: Guard built bundles against secret leakage
        run: npm run audit:bundle-secrets

  deploy-vercel:
    name: Deploy Vercel (${{ matrix.app }})
    needs:
      - detect-changes
      - verify-docs
      - verify-frontend
      - verify-backend
      - verify-full
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.deploy_vercel == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.vercel_matrix) }}

    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ matrix.project_id }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment inputs
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::Missing VERCEL_TOKEN repository secret."
            exit 1
          fi
          if [ -z "${VERCEL_ORG_ID:-}" ]; then
            echo "::error::Missing VERCEL_ORG_ID repository variable."
            exit 1
          fi
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::error::Missing Vercel project id for ${{ matrix.app }}."
            exit 1
          fi

      - name: Select Vercel project
        run: |
          mkdir -p .vercel
          node -e "const fs = require('fs'); fs.writeFileSync('.vercel/project.json', JSON.stringify({ orgId: process.env.VERCEL_ORG_ID, projectId: process.env.VERCEL_PROJECT_ID }, null, 2));"

      - name: Pull production Vercel environment
        run: npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        run: npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --token="$VERCEL_TOKEN"

      - name: Guard production bundle against secret leakage
        run: npm run audit:bundle-secrets
        env:
          BUNDLE_APP: ${{ matrix.app }}
          BUNDLE_DIR: .vercel/output/static

      - name: Deploy production artifact
        id: deploy
        run: |
          set -euo pipefail

          deploy_output="$(npx --yes vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --prod --yes --no-wait --token="$VERCEL_TOKEN" 2>&1)"
          printf '%s\n' "$deploy_output"

          deployment_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[a-z0-9.-]+\.vercel\.app' | tail -n 1)"
          if [ -z "$deployment_url" ]; then
            echo "::error::Vercel deploy did not return a deployment URL."
            exit 1
          fi

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Queued Vercel deployment: $deployment_url" >> "$GITHUB_STEP_SUMMARY"
          npx --yes vercel@${VERCEL_CLI_VERSION} inspect "$deployment_url" --wait --timeout 35m --token="$VERCEL_TOKEN"

  deploy-supabase-functions:
    name: Deploy Supabase Edge Functions
    needs:
      - detect-changes
      - verify-docs
      - verify-frontend
      - verify-backend
      - verify-full
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.deploy_supabase_functions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      CONTROL_PLANE_SUPABASE_PROJECT_REF: ${{ vars.CONTROL_PLANE_SUPABASE_PROJECT_REF || 'xouqxgwccewvbtkqming' }}
      TENANT_SUPABASE_PROJECT_REF: ${{ vars.TENANT_SUPABASE_PROJECT_REF }}
      CONTROL_PLANE_FUNCTIONS: ${{ needs.detect-changes.outputs.control_plane_functions }}
      TENANT_FUNCTIONS: ${{ needs.detect-changes.outputs.tenant_functions }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy selected Supabase functions
        run: npm run deploy:supabase-functions

  smoke-vercel:
    name: Smoke Vercel alias (${{ matrix.app }})
    needs:
      - detect-changes
      - deploy-vercel
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.deploy_vercel == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.vercel_matrix) }}

    steps:
      - name: Check production alias
        run: |
          set -euo pipefail
          echo "Checking ${{ matrix.smoke_url }}"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location --max-time 30 "${{ matrix.smoke_url }}" > /dev/null; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Smoke check failed for ${{ matrix.smoke_url }} after $attempt attempts."
              exit 1
            fi
            sleep 6
          done

  browser-smoke-vercel:
    name: Browser smoke Vercel aliases
    needs:
      - detect-changes
      - deploy-vercel
      - smoke-vercel
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.deploy_vercel == 'true' && needs.detect-changes.outputs.run_browser_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke checks
        run: npm run smoke:browser:deployed
        env:
          SMOKE_APPS: ${{ needs.detect-changes.outputs.smoke_apps }}

      - name: Upload browser smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-artifacts
          path: output/playwright/
          if-no-files-found: ignore

  csp-smoke-vercel:
    name: CSP report-only smoke
    needs:
      - detect-changes
      - deploy-vercel
      - smoke-vercel
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.deploy_vercel == 'true' && needs.detect-changes.outputs.run_csp_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify deployed security headers and report-only CSP
        run: npm run smoke:csp:deployed
        env:
          SMOKE_APPS: ${{ needs.detect-changes.outputs.smoke_apps }}

  control-plane-admin-cors-smoke:
    name: Control-plane admin CORS smoke
    needs:
      - detect-changes
      - deploy-vercel
      - deploy-supabase-functions
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.run_admin_cors_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify control-plane admin CORS preflight
        run: npm run smoke:control-plane-admin-cors

  tenant-resolver-smoke:
    name: Tenant resolver HTTP smoke
    needs:
      - detect-changes
      - deploy-vercel
      - deploy-supabase-functions
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.run_resolver_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify public tenant resolver contract
        run: npm run smoke:tenant-resolver

  auth-smoke-vercel:
    name: Auth smoke Vercel aliases
    needs:
      - detect-changes
      - deploy-vercel
      - deploy-supabase-functions
      - smoke-vercel
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.run_auth_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run authenticated login smoke checks
        run: npm run smoke:auth:deployed
        env:
          AUTH_SMOKE_REQUIRED: 'true'
          AUTH_SMOKE_SCENARIOS: ${{ needs.detect-changes.outputs.auth_scenarios }}
          AUTH_SMOKE_PATIENT_EMAIL: ${{ secrets.AUTH_SMOKE_PATIENT_EMAIL }}
          AUTH_SMOKE_PATIENT_PASSWORD: ${{ secrets.AUTH_SMOKE_PATIENT_PASSWORD }}
          AUTH_SMOKE_DOCTOR_EMAIL: ${{ secrets.AUTH_SMOKE_DOCTOR_EMAIL }}
          AUTH_SMOKE_DOCTOR_PASSWORD: ${{ secrets.AUTH_SMOKE_DOCTOR_PASSWORD }}
          AUTH_SMOKE_SECRETARY_EMAIL: ${{ secrets.AUTH_SMOKE_SECRETARY_EMAIL }}
          AUTH_SMOKE_SECRETARY_PASSWORD: ${{ secrets.AUTH_SMOKE_SECRETARY_PASSWORD }}
          AUTH_SMOKE_PREDOCTOR_EMAIL: ${{ secrets.AUTH_SMOKE_PREDOCTOR_EMAIL }}
          AUTH_SMOKE_PREDOCTOR_PASSWORD: ${{ secrets.AUTH_SMOKE_PREDOCTOR_PASSWORD }}
          AUTH_SMOKE_CONTROL_OWNER_EMAIL: ${{ secrets.AUTH_SMOKE_CONTROL_OWNER_EMAIL }}
          AUTH_SMOKE_CONTROL_OWNER_PASSWORD: ${{ secrets.AUTH_SMOKE_CONTROL_OWNER_PASSWORD }}

      - name: Upload auth smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-smoke-artifacts
          path: output/playwright/
          if-no-files-found: ignore

  deployed-flow-smoke-vercel:
    name: First-band deployed flow smoke
    needs:
      - detect-changes
      - deploy-vercel
      - smoke-vercel
      - auth-smoke-vercel
    if: always() && !failure() && !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.run_flow_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run first-band deployed flow smoke
        run: npm run smoke:flows:deployed
        env:
          FLOW_SMOKE_REQUIRED: 'true'
          AUTH_SMOKE_PATIENT_EMAIL: ${{ secrets.AUTH_SMOKE_PATIENT_EMAIL }}
          AUTH_SMOKE_PATIENT_PASSWORD: ${{ secrets.AUTH_SMOKE_PATIENT_PASSWORD }}
          AUTH_SMOKE_DOCTOR_EMAIL: ${{ secrets.AUTH_SMOKE_DOCTOR_EMAIL }}
          AUTH_SMOKE_DOCTOR_PASSWORD: ${{ secrets.AUTH_SMOKE_DOCTOR_PASSWORD }}
          AUTH_SMOKE_SECRETARY_EMAIL: ${{ secrets.AUTH_SMOKE_SECRETARY_EMAIL }}
          AUTH_SMOKE_SECRETARY_PASSWORD: ${{ secrets.AUTH_SMOKE_SECRETARY_PASSWORD }}
          AUTH_SMOKE_PREDOCTOR_EMAIL: ${{ secrets.AUTH_SMOKE_PREDOCTOR_EMAIL }}
          AUTH_SMOKE_PREDOCTOR_PASSWORD: ${{ secrets.AUTH_SMOKE_PREDOCTOR_PASSWORD }}
          AUTH_SMOKE_CONTROL_OWNER_EMAIL: ${{ secrets.AUTH_SMOKE_CONTROL_OWNER_EMAIL }}
          AUTH_SMOKE_CONTROL_OWNER_PASSWORD: ${{ secrets.AUTH_SMOKE_CONTROL_OWNER_PASSWORD }}

      - name: Upload first-band flow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployed-flow-smoke-artifacts
          path: output/playwright/
          if-no-files-found: ignore
