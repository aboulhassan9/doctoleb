name: DoctoLeb CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: doctoleb-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  VERCEL_CLI_VERSION: 50.1.3

jobs:
  verify:
    name: Lint, Build, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build unified app
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Audit backend contracts
        run: npm run audit:backend-contract

      - name: Run backend DB contract checks
        run: npm run test:backend-db-contract

      - name: Audit high-severity dependencies
        run: npm run audit:high

      - name: Build patient app
        run: npm run build:patient

      - name: Build clinic ops app
        run: npm run build:ops

      - name: Build control-plane app
        run: npm run build:control-plane

  deploy-vercel:
    name: Deploy Vercel (${{ matrix.app }})
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: patient-web
            project_id: prj_2MK3W0zlvtVXwHxrKi036CbXwwuQ
          - app: clinic-ops
            project_id: prj_sTzoaIuPiwD0zR1kFJi82Gy6Oozg
          - app: control-plane
            project_id: prj_PIuy6wTSTvhMsef7dfTg5rOOWXll

    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ matrix.project_id }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment inputs
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::Missing VERCEL_TOKEN repository secret."
            exit 1
          fi
          if [ -z "${VERCEL_ORG_ID:-}" ]; then
            echo "::error::Missing VERCEL_ORG_ID repository variable."
            exit 1
          fi
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::error::Missing VERCEL project id for ${{ matrix.app }}."
            exit 1
          fi

      - name: Select Vercel project
        run: |
          mkdir -p .vercel
          node -e "const fs = require('fs'); fs.writeFileSync('.vercel/project.json', JSON.stringify({ orgId: process.env.VERCEL_ORG_ID, projectId: process.env.VERCEL_PROJECT_ID }, null, 2));"

      - name: Pull production Vercel environment
        run: npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        run: npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --token="$VERCEL_TOKEN"

      - name: Guard patient/ops bundles against local tenant fallback leakage
        if: matrix.app != 'control-plane'
        run: |
          if grep -R -q -E 'gezmfmskhmjgnquoyosq|eyJhbGciOiJIUzI1Ni' .vercel/output/static; then
            echo "::error::Production bundle contains tenant fallback URL/key material."
            exit 1
          fi

      - name: Deploy production artifact
        run: npx --yes vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"

  smoke-vercel:
    name: Smoke Vercel alias (${{ matrix.app }})
    needs: deploy-vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: patient-web
            url: https://doctoleb-patient-web.vercel.app/login
          - app: clinic-ops
            url: https://doctoleb-clinic-ops.vercel.app/login
          - app: control-plane
            url: https://doctoleb-control-plane.vercel.app/

    steps:
      - name: Check production alias
        run: |
          set -euo pipefail
          echo "Checking ${{ matrix.url }}"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location --max-time 30 "${{ matrix.url }}" > /dev/null; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Smoke check failed for ${{ matrix.url }} after $attempt attempts."
              exit 1
            fi
            sleep 6
          done
